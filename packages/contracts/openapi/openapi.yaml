openapi: 3.1.0
info:
  title: Creative Workspace API
  version: 1.0.0
  description: API contract for a cross-platform creative productivity workspace supporting desktop, web, and server synchronization.

servers:
  - url: https://api.example.com
    description: Production server
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Auth
  - name: Documents
  - name: Notes
  - name: Tasks
  - name: AI
  - name: Sync
  - name: Attachments
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /documents:
    get:
      tags: [Documents]
      summary: List documents
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            $ref: '#/components/schemas/DocumentType'
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocumentList'

    post:
      tags: [Documents]
      summary: Create document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

  /documents/{documentId}:
    get:
      tags: [Documents]
      summary: Get document by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Documents]
      summary: Update document
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

    delete:
      tags: [Documents]
      summary: Delete document
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '204':
          description: Deleted

  /documents/{documentId}/restore:
    post:
      tags: [Documents]
      summary: Restore deleted document
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

  /notes:
    get:
      tags: [Notes]
      summary: List notes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notes list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNoteList'
    post:
      tags: [Notes]
      summary: Create note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'

  /notes/{noteId}:
    get:
      tags: [Notes]
      summary: Get note by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NoteId'
      responses:
        '200':
          description: Note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
    patch:
      tags: [Notes]
      summary: Update note
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NoteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
    delete:
      tags: [Notes]
      summary: Delete note
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NoteId'
      responses:
        '204':
          description: Deleted

  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskList'
    post:
      tags: [Tasks]
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get task by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
    patch:
      tags: [Tasks]
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
    delete:
      tags: [Tasks]
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '204':
          description: Deleted

  /tasks/{taskId}/complete:
    post:
      tags: [Tasks]
      summary: Mark task completed
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{taskId}/analyze:
    post:
      tags: [Tasks]
      summary: Analyze task with AI
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAnalysisResponse'

  /ai/chat:
    post:
      tags: [AI]
      summary: Chat with AI assistant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIChatRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIChatResponse'

  /ai/analyze-text:
    post:
      tags: [AI]
      summary: Analyze text for grammar/style suggestions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeTextRequest'
      responses:
        '200':
          description: Suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeTextResponse'

  /ai/summarize:
    post:
      tags: [AI]
      summary: Summarize document or note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummarizeResponse'

  /ai/generate-task:
    post:
      tags: [AI]
      summary: Generate task suggestions from text
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateTaskRequest'
      responses:
        '200':
          description: Generated tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateTaskResponse'

  /sync/push:
    post:
      tags: [Sync]
      summary: Push local changes to server
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPushRequest'
      responses:
        '200':
          description: Sync push result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPushResponse'

  /sync/pull:
    get:
      tags: [Sync]
      summary: Pull remote changes from server
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: since
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Sync pull result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPullResponse'

  /attachments:
    post:
      tags: [Attachments]
      summary: Upload attachment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadAttachmentRequest'
      responses:
        '201':
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'

  /attachments/{attachmentId}:
    get:
      tags: [Attachments]
      summary: Get attachment metadata
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AttachmentId'
      responses:
        '200':
          description: Attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
    delete:
      tags: [Attachments]
      summary: Delete attachment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AttachmentId'
      responses:
        '204':
          description: Deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
    AttachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties: true

    User:
      type: object
      required: [id, email, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    DocumentType:
      type: string
      enum: [draft, note, analysis, taskBrief]

    DocumentStatus:
      type: string
      enum: [active, archived, deleted]

    Document:
      type: object
      required: [id, title, content, type, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        htmlContent:
          type: string
        type:
          $ref: '#/components/schemas/DocumentType'
        status:
          $ref: '#/components/schemas/DocumentStatus'
        tags:
          type: array
          items:
            type: string
        linkedTaskIds:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateDocumentRequest:
      type: object
      required: [title, content, type]
      properties:
        title:
          type: string
        content:
          type: string
        htmlContent:
          type: string
        type:
          $ref: '#/components/schemas/DocumentType'
        tags:
          type: array
          items:
            type: string
        linkedTaskIds:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true

    UpdateDocumentRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        htmlContent:
          type: string
        type:
          $ref: '#/components/schemas/DocumentType'
        status:
          $ref: '#/components/schemas/DocumentStatus'
        tags:
          type: array
          items:
            type: string
        linkedTaskIds:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true

    Note:
      type: object
      required: [id, title, content, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        aiGenerated:
          type: boolean
          default: false
        linkedTaskIds:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateNoteRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        aiGenerated:
          type: boolean
        linkedTaskIds:
          type: array
          items:
            type: string

    UpdateNoteRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        aiGenerated:
          type: boolean
        linkedTaskIds:
          type: array
          items:
            type: string

    Task:
      type: object
      required: [id, title, completed, priority, category, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          format: date
        category:
          type: string
        estimatedTime:
          type: number
        actualTime:
          type: number
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Subtask'
        sourceDocumentId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Subtask:
      type: object
      required: [id, title, completed]
      properties:
        id:
          type: string
        title:
          type: string
        completed:
          type: boolean

    CreateTaskRequest:
      type: object
      required: [title, priority, category]
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          format: date
        category:
          type: string
        estimatedTime:
          type: number
        sourceDocumentId:
          type: string

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          format: date
        category:
          type: string
        estimatedTime:
          type: number
        actualTime:
          type: number
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Subtask'
        sourceDocumentId:
          type: string

    TaskAnalysisResponse:
      type: object
      required: [complexity, suggestions, breakdown]
      properties:
        complexity:
          type: string
          enum: [low, medium, high]
        suggestions:
          type: array
          items:
            type: string
        breakdown:
          type: array
          items:
            type: string

    AIChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        context:
          type: string
          enum: [writing, notes, tasks, general]
        relatedEntityId:
          type: string
        history:
          type: array
          items:
            $ref: '#/components/schemas/AIMessage'

    AIMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    AIChatResponse:
      type: object
      required: [message]
      properties:
        message:
          $ref: '#/components/schemas/AIMessage'
        suggestedActions:
          type: array
          items:
            type: string

    Suggestion:
      type: object
      required: [category, issue, suggestion, explanation]
      properties:
        category:
          type: string
          enum: [grammar, spelling, punctuation, style, clarity]
        issue:
          type: string
        suggestion:
          type: string
        explanation:
          type: string
        position:
          type: integer
        severity:
          type: string
          enum: [low, medium, high]

    AnalyzeTextRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string

    AnalyzeTextResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/Suggestion'

    SummarizeRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        format:
          type: string
          enum: [brief, bullet, detailed]
          default: brief

    SummarizeResponse:
      type: object
      required: [summary]
      properties:
        summary:
          type: string
        bullets:
          type: array
          items:
            type: string

    GenerateTaskRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        category:
          type: string

    GenerateTaskResponse:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/CreateTaskRequest'

    SyncEntityChange:
      type: object
      required: [entityType, entityId, operation, payload, updatedAt]
      properties:
        entityType:
          type: string
          enum: [document, note, task, attachment, user]
        entityId:
          type: string
        operation:
          type: string
          enum: [create, update, delete]
        payload:
          type: object
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time

    SyncPushRequest:
      type: object
      required: [changes]
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/SyncEntityChange'

    SyncPushResponse:
      type: object
      required: [appliedCount, conflicts]
      properties:
        appliedCount:
          type: integer
        conflicts:
          type: array
          items:
            type: object
            additionalProperties: true

    SyncPullResponse:
      type: object
      required: [changes]
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/SyncEntityChange'

    Attachment:
      type: object
      required: [id, filename, mimeType, size, createdAt]
      properties:
        id:
          type: string
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time

    UploadAttachmentRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
